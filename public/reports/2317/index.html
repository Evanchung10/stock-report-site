<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>鴻海 Tabbed Taiwan Equity Report</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #ffffff;
      --line: #d0d7de;
      --muted: #57606a;
      --ink: #24292f;
      --accent: #0969da;
      --active: #fd8c73;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fa;
      color: var(--ink);
    }
    header {
      background: var(--bg);
      color: #f0f6fc;
      padding: 16px 18px 0;
      position: sticky;
      top: 0;
      z-index: 20;
      box-shadow: 0 1px 0 rgba(0, 0, 0, .18);
    }
    .title-row {
      max-width: 1280px;
      margin: 0 auto 12px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: baseline;
    }
    h1 {
      margin: 0;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }
    .subtitle {
      color: #8b949e;
      font-size: 13px;
      white-space: nowrap;
    }
    .home-link { color: #58a6ff; text-decoration: none; font-size: 13px; font-weight: 700; white-space: nowrap; }
    .tabs {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      gap: 4px;
      overflow-x: auto;
      border-bottom: 1px solid #30363d;
    }
    .tab-button {
      appearance: none;
      border: 0;
      border-bottom: 2px solid transparent;
      background: transparent;
      color: #c9d1d9;
      padding: 12px 14px 10px;
      min-width: 138px;
      text-align: left;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
    }
    .tab-button span {
      display: block;
      margin-top: 2px;
      color: #8b949e;
      font-size: 11px;
      font-weight: 500;
    }
    .tab-button.active {
      color: #ffffff;
      border-bottom-color: var(--active);
    }
    .tab-button.active span { color: #c9d1d9; }
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 14px 14px 24px;
    }
    .tab-panel {
      display: none;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      min-height: calc(100vh - 132px);
    }
    .tab-panel.active { display: block; }
    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 134px);
      border: 0;
      background: #ffffff;
    }
    @media (max-width: 760px) {
      .title-row { display: block; }
      .home-link { display: inline-block; margin-bottom: 6px; white-space: normal; }
      .subtitle { display: block; margin-top: 4px; white-space: normal; }
      .tab-button { min-width: 124px; padding-left: 10px; padding-right: 10px; }
      main { padding: 8px; }
      .tab-panel { border-radius: 6px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="title-row">
      <h1>鴻海 (2317) Taiwan Equity Report</h1>
      <div class="subtitle"><a class="home-link" href="../../">← 回到首頁</a> ｜ Tabbed Navigation ｜分頁導覽整合版</div>
    </div>
    <nav class="tabs" role="tablist" aria-label="Taiwan equity report sections">
      <button class="tab-button active" role="tab" aria-selected="true" data-target="fundamental">Fundamental<span>基本面與估值</span></button>
<button class="tab-button" role="tab" aria-selected="false" data-target="technical">Technical<span>技術分析</span></button>
<button class="tab-button" role="tab" aria-selected="false" data-target="data">Data<span>資料來源與限制</span></button>
<button class="tab-button" role="tab" aria-selected="false" data-target="overlay">Overlay<span>補充觀點</span></button>
    </nav>
  </header>
  <main>
    <section class="tab-panel active" id="fundamental" role="tabpanel"><iframe src="Fundamental_Taiwan_Equity_Report_2317.html" title="Fundamental report"></iframe></section>
<section class="tab-panel" id="technical" role="tabpanel"><iframe src="Technical_Taiwan_Equity_Report_2317.html" title="Technical report"></iframe></section>
<section class="tab-panel" id="data" role="tabpanel"><iframe src="Data_Taiwan_Equity_Report_2317.html" title="Data report"></iframe></section>

<section class="tab-panel" id="overlay" role="tabpanel"><iframe src="Analyst_Overlay_2317.html" title="Analyst overlay"></iframe></section>
  </main>
  <script>
    const buttons = Array.from(document.querySelectorAll('.tab-button'));
    const panels = Array.from(document.querySelectorAll('.tab-panel'));
    function activate(target) {
      buttons.forEach(button => {
        const active = button.dataset.target === target;
        button.classList.toggle('active', active);
        button.setAttribute('aria-selected', String(active));
      });
      panels.forEach(panel => panel.classList.toggle('active', panel.id === target));
      history.replaceState(null, '', '#' + target);
    }
    buttons.forEach(button => button.addEventListener('click', () => activate(button.dataset.target)));
    const initial = location.hash.replace('#', '');
    if (initial && panels.some(panel => panel.id === initial)) activate(initial);
  </script>
</body>
</html>
